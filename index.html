<!DOCTYPE html>
<html>
<head>
    <title>Strait of Hormuz Status</title>
    <style>
        body { background-color: #27ae60; color: white; font-family: 'Courier New', monospace; text-align: center; transition: background 1s; }
        .ticker-wrap { position: fixed; bottom: 0; width: 100%; overflow: hidden; background: rgba(0,0,0,0.8); height: 50px; }
        .ticker { display: inline-block; white-space: nowrap; animation: ticker 30s linear infinite; font-size: 24px; line-height: 50px; }
        @keyframes ticker { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
        .clock { font-size: 1.2rem; margin-top: 20px; color: #00ff00; }
        h1 { margin-top: 10vh; font-size: 3rem; }
        .status { font-size: 10rem; font-weight: bold; margin: 20px; }
    </style>
</head>
<body>
    <div class="clock">LIVE BROADCAST: 2026-05-02 21:00:00 GMT</div>
    <h1>IS THE STRAIT OF HORMUZ CLOSED?</h1>
    <div class="status">NO</div>
    <p style="font-size: 1.5rem;">"Smooth sailing. The oil is flowing like cheap coffee."</p>

    <div class="ticker-wrap">
        <div class="ticker">
            BREAKING: No news... suspiciously quiet. — GAS PRICES: RISING — ADVISORY: WATCH OUT FOR UNIDENTIFIED DRONES — 
        </div>
    </div>
</body>
</html>
