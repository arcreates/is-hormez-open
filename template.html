<!DOCTYPE html>
<html>
<head>
    <title>NavyPirateMonitor.com | LIVE</title>
    <style>
        body { background: #000; color: #fff; font-family: monospace; }
        .pirate-banner { background: #440000; color: #ff4d4d; padding: 10px; text-align: center; border-bottom: 2px solid #ff4d4d; }
        .danger { color: #ff0000; }
        .chill { color: #00ff00; }
        .dot { font-size: 20px; }
    </style>
</head>
<body>
    <div class="pirate-banner">🏴‍☠️ NAVY PIRATE MONITOR - MAY 2026 🏴‍☠️</div>
    
    <div style="padding: 20px;">
        <h1>Current Headline: [[headline]]</h1>
        <p>Oil Price: $[[oil_price]] | Global War Cost: $[[war_cost]]B</p>
        <p>Status: <span class="[[status_class]]">[[status_text]]</span></p>
        
        <div class="quote-box">
            <p><em>[[meme_quote]]</em></p>
        </div>

        <hr>
        <h3>Captain's Log (History)</h3>
        <table border="1" width="100%">
            <thead>
                <tr>
                    <th>Time</th>
                    <th>Status</th>
                    <th>Oil</th>
                </tr>
            </thead>
            <tbody>
                </tbody>
        </table>
    </div>
</body>
</html>
