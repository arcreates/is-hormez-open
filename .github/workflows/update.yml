name: Hormez Monitor Update

on:
  schedule:
    - cron: '23 * * * *'  # Runs at 23 minutes past every hour
  workflow_dispatch:      # THIS provides the manual "Run" button

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install requests

      - name: Run Monitor Script
        env:
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
        run: python check_the_straight.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html history.txt counters.txt
          git diff --quiet && git diff --staged --quiet || (git commit -m "Intel Sync: $(date)" && git push)
