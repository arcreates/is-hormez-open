name: Update Hormez Monitor

on:
  schedule:
    - cron: '0 * * * *' # Runs every hour
  workflow_dispatch:      # Allows you to run it manually for testing

permissions:
  contents: write         # Gives the bot permission to save your scores

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # Fetches full history so it can push back

      - name: Set up Python
        uses: actions/checkout@v4
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install requests

      - name: Run Monitor Script
        env:
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
        run: python check_the_straight.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html history.txt counters.txt
          # Only commit if there are actually changes to avoid errors
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update: [[ $(date) ]] Intel Sync" && git push)
