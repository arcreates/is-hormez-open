name: Hormez Monitor Update

on:
  schedule:
    - cron: '37 * * * *' # Random minute to avoid busy times
  workflow_dispatch:      # This creates the manual run button!

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Deps
        run: pip install requests

      - name: Run
        env:
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
        run: python check_the_straight.py

      - name: Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html history.txt counters.txt
          git diff --quiet && git diff --staged --quiet || (git commit -m "Intel Sync: $(date)" && git push)
